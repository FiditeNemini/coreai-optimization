# pyproject-fmt formatter config (https://pyproject-fmt.readthedocs.io).
# Shared by the pre-commit hook (which runs on `pyproject.toml`,
# `external/pyproject.toml`, and `pyproject_delta.toml`) so manual edits to any
# of those files and the render-config output agree on the same canonical form.

indent = 4
keep_full_version = true

# Cap auto-generated Python version classifiers at 3.13 to match
# `requires-python`. Without this, pyproject-fmt's default (3.14) would add
# classifiers for Python versions the project doesn't support.
max_supported_python = "3.13"

# Expand sub-tables into `[table.subtable]` headers rather than dotted keys,
# matching the existing convention (`[tool.oss-export]`, `[project.urls]`).
table_format = "long"
