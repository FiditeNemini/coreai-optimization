[maxbodylength]
maxBodyLength = 10

# Override the default `all clean test` requirement: the internal Makefile is
# `include external/Makefile` plus internal-only targets, and the OSS-side
# Makefile in `external/` is what actually defines `all`, `clean`, `test`.
# checkmake doesn't follow includes, so without this override it would flag the
# internal Makefile for missing targets that are present in the included file.
[minphony]
disabled = true
